<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emissão de Senha — Acolhimento</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/api/env"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/sga.js"></script>
<style>
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
  .emit-wrap{width:100%;max-width:420px}
  .emit-header{text-align:center;margin-bottom:1.75rem}
  .emit-header img{max-width:300px}
  .emit-header .setor{font-size:12px;font-weight:600;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-top:8px}
  .emit-header .sub{color:var(--text-muted);font-size:14px;margin-top:3px}
  .fila-info{display:flex;gap:8px;justify-content:center;margin-bottom:1.25rem}
  .tipo-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:1.6rem 1rem;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all .15s;margin-bottom:1rem;text-align:center;gap:6px}
  .tipo-btn:hover{border-color:var(--blue-mid);background:var(--blue-light);transform:translateY(-1px)}
  .tipo-btn.pref{border-color:#c87941}
  .tipo-btn.pref:hover{background:var(--amber-light);border-color:var(--amber)}
  .tipo-btn .tipo-icon{font-size:30px}
  .tipo-btn .tipo-label{font-size:18px;font-weight:600;color:var(--text)}
  .tipo-btn.pref .tipo-label{color:var(--amber)}
  .tipo-btn .tipo-desc{font-size:12px;color:var(--text-muted)}
  .ticket-screen{display:none;background:var(--white);border:2px dashed var(--border);border-radius:var(--radius);padding:2rem;text-align:center;margin-top:1rem}
  .ticket-screen.pref{border-color:#c87941}
  .ts-pref{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--amber);min-height:18px;margin-bottom:8px}
  .ts-num{font-size:62px;font-weight:700;color:var(--text);line-height:1}
  .ts-sub{font-size:13px;color:var(--text-muted);margin-top:8px}
  .ts-fila{font-size:13px;color:var(--blue);margin-top:4px;font-weight:500}
  .ts-hora{font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);padding-top:10px;margin-top:12px}
  .acoes{display:none;gap:.75rem;margin-top:1rem}
  .acoes .btn{flex:1;padding:11px;font-size:14px}
  #print-area{display:none}
  @media print{
    body *{visibility:hidden}
    #print-area,#print-area *{visibility:visible}
    #print-area{display:block !important;position:fixed;top:0;left:0;width:80mm}
    .print-ticket{
      font-family:'Courier New',monospace;
      text-align:center;
      padding:4mm 3mm;
      color:#000 !important;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
    }
    .pt-logo{width:55mm;margin-bottom:3mm;filter:contrast(150%) brightness(0)}
    .pt-setor{
      font-size:10pt;font-weight:900;letter-spacing:1px;
      border-top:2px solid #000;border-bottom:2px solid #000;
      padding:2mm 0;margin:3mm 0;color:#000
    }
    .pt-tipo{font-size:10pt;font-weight:700;margin-bottom:3mm;color:#000}
    .pt-num{font-size:48pt;font-weight:900;letter-spacing:3px;margin:3mm 0;line-height:1;color:#000}
    .pt-fila{font-size:9pt;font-weight:600;margin-bottom:3mm;color:#000}
    .pt-mensagem{font-size:9pt;font-weight:600;border-top:2px solid #000;padding-top:3mm;margin-top:3mm;color:#000}
    .pt-hora{font-size:8pt;margin-top:2mm;color:#000;font-weight:600}
  }
</style>
</head>
<body>
<div class="emit-wrap">
  <div class="emit-header">
    <img src="/img/logo-colorida.png" alt="Prefeitura de Fortaleza — Regional 6">
    <div class="setor">Acolhimento</div>
    <div class="sub">Selecione o tipo de atendimento</div>
  </div>
  <div class="fila-info" id="fila-info">
    <span class="badge badge-blue">Normal: —</span>
    <span class="badge badge-amber">Preferencial: —</span>
  </div>
  <div id="tipos-container"><p style="text-align:center;color:var(--text-muted);padding:2rem 0;font-size:14px">Carregando...</p></div>
  <div class="ticket-screen" id="ticket">
    <div class="ts-pref" id="t-tipo"></div>
    <div class="ts-num"  id="t-num"></div>
    <div class="ts-sub">Aguarde ser chamado no painel</div>
    <div class="ts-fila" id="t-fila"></div>
    <div class="ts-hora" id="t-hora"></div>
  </div>
  <div class="acoes" id="acoes" style="display:none">
    <button class="btn" onclick="resetar()">Nova senha</button>
  </div>
</div>
<div id="print-area">
  <div class="print-ticket">
    <img class="pt-logo" src="/img/logo-colorida.png" alt="Prefeitura de Fortaleza">
    <div class="pt-setor">ACOLHIMENTO — REGIONAL 6</div>
    <div class="pt-tipo" id="pt-tipo"></div>
    <div class="pt-num"  id="pt-num"></div>
    <div class="pt-fila" id="pt-fila"></div>
    <div class="pt-mensagem">Aguarde ser chamado no painel</div>
    <div class="pt-hora" id="pt-hora"></div>
  </div>
</div>
<script>
  SGA.on('estado_inicial', d => {
    renderTipos(d.tiposSenha || []);
    renderFilaInfo(d.filaNormalQtd, d.filaPrefQtd);
  });
  SGA.on('fila_atualizada', d => renderFilaInfo(d.filaNormalQtd, d.filaPrefQtd));
  SGA.on('fila_resetada', () => { renderFilaInfo(0,0); resetar(); });

  async function emitir(tipoId) {
    const res = await fetch('/api/emitir', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({tipoId})
    }).then(r=>r.json());
    if(!res.ok){alert(res.erro);return;}

    const hora=new Date().toLocaleTimeString('pt-BR'), data=new Date().toLocaleDateString('pt-BR');

    // Preenche cupom de impressão
    document.getElementById('pt-tipo').textContent=res.preferencial?'★ ATENDIMENTO PREFERENCIAL':'ATENDIMENTO NORMAL';
    document.getElementById('pt-num').textContent=res.num;
    document.getElementById('pt-fila').textContent=res.preferencial?`${res.posicao}ª na fila preferencial`:`${res.posicao}ª na fila`;
    document.getElementById('pt-hora').textContent=`${data} — ${hora}`;

    // Mostra ticket na tela brevemente
    document.getElementById('tipos-container').style.display='none';
    document.getElementById('fila-info').style.display='none';
    const t=document.getElementById('ticket');
    t.className='ticket-screen'+(res.preferencial?' pref':'');
    t.style.display='block';
    document.getElementById('t-tipo').textContent=res.preferencial?'★ PREFERENCIAL':'';
    document.getElementById('t-num').textContent='Senha '+res.num;
    document.getElementById('t-fila').textContent=res.preferencial?`${res.posicao}ª na fila preferencial`:`${res.posicao}ª na fila`;
    document.getElementById('t-hora').textContent=`${data}  ${hora}`;

    // Imprime automaticamente após 300ms (tempo para renderizar o cupom)
    setTimeout(() => {
      window.print();
      // Volta para a tela inicial após a impressão (5 segundos)
      setTimeout(() => resetar(), 5000);
    }, 300);
  }

  function resetar() {
    document.getElementById('tipos-container').style.display='block';
    document.getElementById('fila-info').style.display='flex';
    document.getElementById('ticket').style.display='none';
    document.getElementById('acoes').style.display='none';
  }

  function renderTipos(tipos) {
    if(!tipos.length) return;
    document.getElementById('tipos-container').innerHTML = tipos.map(t=>`
      <button class="tipo-btn ${t.preferencial?'pref':''}" onclick="emitir(${t.id})">
        <span class="tipo-icon">${t.preferencial?'⭐':'🎫'}</span>
        <span class="tipo-label">${t.label}</span>
        <span class="tipo-desc">${t.preferencial?'Idoso, gestante, PCD e outros':'Atendimento geral'}</span>
      </button>`).join('');
  }

  function renderFilaInfo(n,p) {
    document.getElementById('fila-info').innerHTML=
      `<span class="badge badge-blue">Normal: ${n}</span><span class="badge badge-amber">Preferencial: ${p}</span>`;
  }

  SGA.iniciarRealtime();
  SGA.carregarEstado();
</script>
</body>
</html>
