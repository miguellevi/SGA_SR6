<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo.png"> 
<title>Monitor — Acolhimento</title>
<script src="/api/env"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/sga.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#050c1a;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
  header{background:#080f20;border-bottom:1px solid #0e2040;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
  header img{height:54px}
  .hdr-hora{font-size:26px;font-weight:300;color:#fff;letter-spacing:2px;text-align:right}
  .hdr-data{font-size:13px;color:#4a7fa8;margin-top:2px;text-align:right}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.5rem}
  .setor-label{color:#1e3a6a;font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase}
  .call-box{background:#080f20;border:2px solid #1e4080;border-radius:16px;padding:2.5rem 4rem;text-align:center;min-width:500px;transition:border-color .3s}
  .call-box.pref{border-color:#c87941}
  .pref-label{font-size:13px;font-weight:600;letter-spacing:3px;color:#c87941;text-transform:uppercase;min-height:20px;margin-bottom:12px}
  .call-senha{font-size:80px;font-weight:700;color:#fff;line-height:1;letter-spacing:3px}
  .call-sep{width:60px;height:2px;background:#1e4080;margin:16px auto;display:none}
  .call-box.pref .call-sep{background:#c87941}
  .call-guiche{font-size:28px;font-weight:400;color:#7ab8f5;letter-spacing:1px}
  .call-idle{font-size:24px;color:#1e3060;font-weight:300}
  .hist-title{font-size:11px;letter-spacing:2px;color:#1e3060;text-transform:uppercase;text-align:center}
  .hist-list{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  .hist-item{background:#080f20;border:1px solid #0e2040;border-radius:8px;padding:8px 20px;font-size:14px;color:#2a5080}
  .hist-item.pref{border-color:#4a2a10;color:#6b4020}
  .guiches-wrap{text-align:center}
  .guiches-grid{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-top:.5rem}
  .g-chip{background:#080f20;border:1px solid #0e2040;border-radius:8px;padding:6px 14px;font-size:13px;color:#2a5080}
  .g-chip.ativo{border-color:#1e4080;color:#4a7fa8}
  .g-chip.atendendo{border-color:#0e5025;color:#1d9e75}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:.4}}
  .new-call{animation:flash .4s ease 3}
  @media(max-width:600px){.call-senha{font-size:52px}.call-box{min-width:unset;padding:1.5rem 2rem}.call-guiche{font-size:20px}}
</style>
</head>
<body>
<header>
  <img src="/img/logo.png" alt="Prefeitura de Fortaleza — Regional 6">
  <div>
    <div class="hdr-hora" id="hora">00:00:00</div>
    <div class="hdr-data" id="data-hoje"></div>
  </div>
</header>

<main>
  <div class="setor-label">Acolhimento</div>
  <div class="call-box" id="call-box">
    <div class="pref-label" id="call-pref"></div>
    <div class="call-senha" id="call-senha"><span class="call-idle">Aguardando...</span></div>
    <div class="call-sep" id="call-sep"></div>
    <div class="call-guiche" id="call-guiche"></div>
  </div>
  <div id="hist-wrap" style="display:none;text-align:center">
    <div class="hist-title mb-1">Chamadas anteriores</div>
    <div class="hist-list" id="hist-list"></div>
  </div>
  <div class="guiches-wrap">
    <div class="hist-title mb-1">Guichês</div>
    <div class="guiches-grid" id="guiches-grid"></div>
  </div>
</main>

<script>
  let historico = [];

  function tick() {
    const now = new Date();
    document.getElementById('hora').textContent = now.toLocaleTimeString('pt-BR');
    const dias=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    document.getElementById('data-hoje').textContent =
      `${dias[now.getDay()]}, ${now.getDate()} de ${meses[now.getMonth()]} de ${now.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  SGA.on('estado_inicial', d => {
    renderGuiches(d.guiches || []);
  });

  SGA.on('nova_chamada', c => {
    mostrarChamada(c, true);
    historico.unshift(c);
    if (historico.length > 4) historico.pop();
    renderHistorico(historico.slice(1));
  });

  SGA.on('guiches_atualizados', () => {
    fetch('/api/estado').then(r=>r.json()).then(d => renderGuiches(d.guiches || []));
  });

  SGA.on('fila_resetada', () => {
    historico = [];
    document.getElementById('call-senha').innerHTML = '<span class="call-idle">Aguardando...</span>';
    document.getElementById('call-pref').textContent = '';
    document.getElementById('call-guiche').textContent = '';
    document.getElementById('call-sep').style.display = 'none';
    document.getElementById('call-box').className = 'call-box';
    document.getElementById('hist-wrap').style.display = 'none';
  });

  function mostrarChamada(c, animar) {
    const box = document.getElementById('call-box');
    box.className = 'call-box'+(c.preferencial?' pref':'')+(animar?' new-call':'');
    document.getElementById('call-pref').textContent = c.preferencial ? '★ Atendimento Preferencial' : '';
    document.getElementById('call-senha').textContent = 'Senha ' + c.num;
    document.getElementById('call-sep').style.display = 'block';
    document.getElementById('call-guiche').textContent = c.nomeGuiche;
  }

  function renderHistorico(hist) {
    const wrap = document.getElementById('hist-wrap');
    const list = document.getElementById('hist-list');
    if (!hist.length) { wrap.style.display='none'; return; }
    wrap.style.display = 'block';
    list.innerHTML = hist.map(h =>
      `<div class="hist-item${h.preferencial?' pref':''}">Senha ${h.num} → ${h.nomeGuiche}</div>`
    ).join('');
  }

  function renderGuiches(guiches) {
    document.getElementById('guiches-grid').innerHTML = guiches.map(g => {
      let cls='g-chip';
      let label=g.nome;
      if(g.senha_atual){cls+=' atendendo';label+=` · ${g.senha_atual}`;}
      else if(g.ativo){cls+=' ativo';}
      return `<div class="${cls}">${label}${g.atendente?' ('+g.atendente+')':''}</div>`;
    }).join('');
  }

  SGA.iniciarRealtime();
  SGA.carregarEstado();
</script>
</body>
</html>
