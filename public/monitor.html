<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor — Acolhimento</title>
<script src="/api/env"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/sga.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #f0f2f5; color: #1a1a2e; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    background: #FF6D2D;
    border-bottom: 3px solid #e05520;
    padding: .8rem 1.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    height: 80px;
  }
  header img { height: 52px; }
  .hdr-center { text-align: center; }
  .hdr-setor { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 6px; text-transform: uppercase; }
  .hdr-right { text-align: right; }
  .hdr-hora { font-size: 42px; font-weight: 300; color: #fff; letter-spacing: 3px; line-height: 1; }
  .hdr-data { font-size: 15px; color: #ffe0d0; margin-top: 4px; font-weight: 400; }

  /* ── Layout Otimizado para Tela Cheia ── */
  .body-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ── PAINEL CENTRAL SGA ── */
  .sga-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2vh 2vw;
    overflow: hidden;
    background: #f0f2f5;
  }

  .setor-label {
    color: #FF6D2D;
    font-size: 45px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  /* Caixa Principal de Chamada corrigida */
  .call-box {
    flex: 1;
    width: 100%;
    max-width: 1300px;
    background: #ffffff;
    border: 5px solid #FF6D2D;
    border-radius: 24px;
    padding: 2vh 2vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: cubic-bezier(0.16, 1, 0.3, 1);
    justify-content: space-around; /* Garante espaçamento harmônico interno */
    box-shadow: 0 10px 40px rgba(255,109,45,0.15);
    overflow: hidden;
  }
  .call-box.pref { border-color: #c87941; box-shadow: 0 10px 40px rgba(255,109,45,0.18); }
  
  .pref-label { font-size: 24px; font-weight: 700; letter-spacing: 3px; color: #c87941; text-transform: uppercase; min-height: 32px; }
  
  /* Tamanho balanceado para não quebrar linha agressivamente */
  .call-senha { 
    font-size: 10vw; 
    font-weight: 800; 
    color: #FF6D2D; 
    line-height: 1; 
    letter-spacing: 2px; 
    text-align: center;
    width: 100%;
    word-wrap: break-word;
  }
  .call-box.pref .call-senha { color: #c87941; }
  
  .call-sep { width: 200px; height: 4px; background: #FF6D2D; display: none; border-radius: 2px; }
  .call-box.pref .call-sep { background: #c87941; }
  
  .call-guiche { font-size: 4.5vw; font-weight: 700; color: #FF6D2D; letter-spacing: 1px; text-transform: uppercase; }
  .call-box.pref .call-guiche { color: #c87941; }
  
  .call-idle { font-size: 45px; color: #b0b8c8; font-weight: 300; }

  /* Histórico e Guichês inferiores */
  .hist-title { font-size: 13px; letter-spacing: 2px; color: #b05030; text-transform: uppercase; text-align: center; font-weight: 700; }
  .hist-list { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: .3rem; }
  .hist-item { background: #fff; border: 1px solid #ffd0b0; border-radius: 8px; padding: 6px 16px; font-size: 15px; color: #c04010; font-weight: 600; }
  .hist-item.pref { border-color: #f0c090; color: #a06020; background: #fff9f0; }

  .guiches-wrap { text-align: center; width: 100%; }
  .guiches-grid { display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center; margin-top: .3rem; }
  .g-chip { background: #fff; border: 1px solid #ffd0b0; border-radius: 6px; padding: 6px 14px; font-size: 13px; color: #b05030; }
  .g-chip.ativo { border-color: #FF6D2D; color: #FF6D2D; background: #fff3ee; font-weight: 600; }
  .g-chip.atendendo { border-color: #2d8a4e; color: #2d8a4e; background: #eafaf0; font-weight: 600; }

  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:.4} }
  .new-call { animation: flash .4s ease 3; }

  /* ── Botão ativar som ── */
  #btn-som {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: #FF6D2D;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,109,45,0.5);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: pulsar 1.5s ease-in-out infinite;
    transition: opacity .5s, transform .5s;
  }
  #btn-som.sumindo { opacity: 0; transform: scale(0.8); pointer-events: none; }
  @keyframes pulsar {
    0%,100% { box-shadow: 0 4px 20px rgba(255,109,45,0.5); }
    50%      { box-shadow: 0 4px 35px rgba(255,109,45,0.9); }
  }
</style>
</head>
<body>

<header>
  <img src="/img/logo-branca.png" alt="Prefeitura de Fortaleza — Regional 6">
  <div class="hdr-center">
    <div class="hdr-setor">Acolhimento</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-hora" id="hora">00:00:00</div>
    <div class="hdr-data" id="data-hoje"></div>
  </div>
</header>

<div class="body-wrap">

  <!-- ══ PAINEL CENTRAL REENQUADRADO ══ -->
  <div class="sga-side">
    <div class="setor-label">Senhas</div>

    <div class="call-box" id="call-box">
      <div class="pref-label" id="call-pref"></div>
      <div class="call-senha" id="call-senha"><span class="call-idle">Aguardando...</span></div>
      <div class="call-sep" id="call-sep"></div>
      <div class="call-guiche" id="call-guiche"></div>
    </div>

    <div id="hist-wrap" style="display:none;text-align:center;width:100%">
      <div class="hist-title">Chamadas anteriores</div>
      <div class="hist-list" id="hist-list"></div>
    </div>

    <div class="guiches-wrap">
      <div class="hist-title">Guichês</div>
      <div class="guiches-grid" id="guiches-grid"></div>
    </div>
  </div>

</div>

<script>
  console.log("VERSAO DO SISTEMA: 2.2 - LAYOUT FIX");
  
  // ── Relógio ──
  function tick() {
    const now = new Date();
    document.getElementById('hora').textContent = now.toLocaleTimeString('pt-BR');
    const dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    document.getElementById('data-hoje').textContent =
      `${dias[now.getDay()]}  ${now.getDate()} de ${meses[now.getMonth()]} de ${now.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  // ── Sistema de Som e Voz ─────────────────────────────────────────────────────
  let audioCtx = null;

  function falarChamada(num, guiche, pref) {
    let playlist = ['bipe'];
    
    if (pref === true || pref === "true" || pref === 1) {
        playlist.push('preferencial');
    }
    playlist.push('senha');

    let s = String(num).replace(/^[a-zA-Z]+/, ''); 
    s = s.replace(/\D/g, ''); 
    if (!s) s = '0';
    for (let char of s) {
        playlist.push(char);
    }

    playlist.push('guiche');

    let gMatch = String(guiche).match(/\d+/); 
    let g = gMatch ? gMatch[0] : '0';
    g = parseInt(g, 10).toString();
    for (let char of g) {
        playlist.push(char);
    }

    tocarSequencia(playlist);
  }

  async function tocarSequencia(lista) {
    for (const item of lista) {
        await new Promise((resolve) => {
            const som = new Audio(`/sons/${item}.mp3`);
            som.playbackRate = 1.4;
            som.onended = () => { resolve(); };
            som.onerror = () => { resolve(); };
            som.play().catch((err) => { resolve(); });
        });
    }
  }

  // ── SGA Realtime ──
  let historico = [];

  SGA.on('estado_inicial', d => renderGuiches(d.guiches || []));

  SGA.on('nova_chamada', c => {
    falarChamada(c.num, c.nomeGuiche, c.preferencial); 
    mostrarChamada(c, true);
    historico.unshift(c);
    if (historico.length > 4) historico.pop();
    renderHistorico(historico.slice(1));
  });

  SGA.on('guiches_atualizados', () => {
    fetch('/api/estado').then(r=>r.json()).then(d => renderGuiches(d.guiches || []));
  });

  SGA.on('fila_resetada', () => {
    historico = [];
    document.getElementById('call-senha').innerHTML = '<span class="call-idle">Aguardando...</span>';
    document.getElementById('call-pref').textContent = '';
    document.getElementById('call-guiche').textContent = '';
    document.getElementById('call-sep').style.display = 'none';
    document.getElementById('call-box').className = 'call-box';
    document.getElementById('hist-wrap').style.display = 'none';
  });

  function mostrarChamada(c, animar) {
    const box = document.getElementById('call-box');
    box.className = 'call-box' + (c.preferencial?' pref':'') + (animar?' new-call':'');
    document.getElementById('call-pref').textContent = c.preferencial ? '★ Atendimento Preferencial' : '';
    document.getElementById('call-senha').textContent = 'Senha ' + c.num;
    document.getElementById('call-sep').style.display = 'block';
    document.getElementById('call-guiche').textContent = c.nomeGuiche;
  }

  function renderHistorico(hist) {
    const wrap = document.getElementById('hist-wrap');
    const list = document.getElementById('hist-list');
    if (!hist.length) { wrap.style.display='none'; return; }
    wrap.style.display = 'block';
    list.innerHTML = hist.map(h =>
      `<div class="hist-item${h.preferencial?' pref':''}">Senha ${h.num} → ${h.nomeGuiche}</div>`
    ).join('');
  }

  function renderGuiches(guiches) {
    document.getElementById('guiches-grid').innerHTML = guiches.map(g => {
      let cls='g-chip';
      let label=g.nome;
      if(g.senha_atual){cls+=' atendendo';label+=` · ${g.senha_atual}`;}
      else if(g.ativo){cls+=' ativo';}
      return `<div class="${cls}">${label}${g.atendente?' ('+g.atendente+')':''}</div>`;
    }).join('');
  }

  // ── Botão ativar som ──
  function ativarSom() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const unlock = new Audio("/sons/bipe.mp3");
    unlock.volume = 0.01;
    unlock.play().catch(() => {});

    const btn = document.getElementById('btn-som');
    btn.classList.add('sumindo');
    setTimeout(() => btn.style.display = 'none', 600);
  }

  setTimeout(() => {
    const btn = document.getElementById('btn-som');
    if (btn && !btn.classList.contains('sumindo')) {
      btn.classList.add('sumindo');
      setTimeout(() => btn.style.display = 'none', 600);
    }
  }, 15000);

  SGA.iniciarRealtime();
  SGA.carregarEstado();
</script>

<button id="btn-som" onclick="ativarSom()">🔊 Toque aqui para ativar o som</button>

</body>
</html>
